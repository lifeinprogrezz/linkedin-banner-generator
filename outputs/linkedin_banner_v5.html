<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Banner v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&display=block" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: #FAFAFA;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: geometricPrecision;
  }

  .banner {
    position: relative;
    width: 1584px;
    height: 396px;
    background: #FAFAFA;
  }

  /* Name — top-right */
  .name {
    position: absolute;
    top: 56px;
    right: 56px;
    margin: 0;
    font-weight: 600;
    font-size: 56px;
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: #1A1A1A;
    white-space: nowrap;
  }

  /* Tagline — bottom-right, tracked uppercase */
  .tagline {
    position: absolute;
    bottom: 56px;
    right: 56px;
    margin: 0;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.0;
    letter-spacing: 0.18em;
    color: #999999;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="name">Roberto Quintero</div>
    <div class="tagline">BUILDING CONSUMER PRODUCTS · BARCELONA</div>
  </div>
</body>
</html>
